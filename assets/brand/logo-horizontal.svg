<svg viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#F5B942"/>
    </linearGradient>
  </defs>

  <!-- ICON (IDENTICAL PROPORTION SYSTEM) -->
  <g transform="translate(20,30)">
    <!-- horizontal -->
    <rect x="0" y="40" width="120" height="40" rx="20" fill="url(#gold)"/>
    <!-- vertical -->
    <rect x="40" y="0" width="40" height="120" rx="20" fill="url(#gold)"/>

    <!-- play (centered properly) -->
    <polygon points="48,35 90,60 48,85" fill="#0B0B0D"/>
  </g>

  <!-- TEXT -->
  <g transform="translate(170,90)">
    <text
      font-family="Inter, system-ui, sans-serif"
      font-size="90"
      font-weight="600"
      fill="#FFFFFF"
      stroke="#000"
      stroke-width="2"
      paint-order="stroke fill"
      dy="0.35em">

      Play<tspan fill="#F5B942">My</tspan>Subs
    </text>
  </g>

</svg>