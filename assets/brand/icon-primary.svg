    <rect x="208" y="120" width="96" height="272" rx="48"></rect>
    <rect x="120" y="208" width="272" height="96" rx="48"></rect>
  </g>

  <!-- Play triangle -->
  <polygon points="220,190 340,256 220,322" fill="#0B0B0D"></polygon>
